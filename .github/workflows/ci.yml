name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend quality and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  frontend:
    name: Frontend quality, tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      - name: Build application
        run: pnpm run build

  postgres:
    name: PostgreSQL migrations and integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5-alpine
        env:
          POSTGRES_DB: gabflow_ci
          POSTGRES_USER: gabflow
          POSTGRES_PASSWORD: gabflow-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gabflow -d gabflow_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://gabflow:gabflow-ci-password@localhost:5432/gabflow_ci
      POSTGRES_TEST_DATABASE_URL: postgresql+psycopg://gabflow:gabflow-ci-password@localhost:5432/gabflow_ci
      SECRET_KEY: ci-secret-key-with-at-least-32-bytes
      JWT_SECRET_KEY: ci-jwt-secret-key-with-at-least-32-bytes
      RATELIMIT_STORAGE_URI: memory://

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run migrations and PostgreSQL integration tests
        run: pytest -m postgres tests/postgres
