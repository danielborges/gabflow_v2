[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --disable-warnings --strict-markers"
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "S"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"migrations/versions/*.py" = ["E501", "I001"]
