openapi: 3.1.0
info:
  title: GabFlow API
  version: 0.4.0
  description: API principal para gestão de gabinetes municipais.
servers:
  - url: https://api.gabflow.example/api/v1
security:
  - cookieAuth: []
paths:
  /solicitacoes:
    get:
      summary: Lista solicitações
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: categoriaId
          schema:
            type: string
            format: uuid
        - in: query
          name: bairroId
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Página de solicitações
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SolicitacaoPage"
    post:
      summary: Cria uma solicitação
      operationId: criarSolicitacao
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarSolicitacaoRequest"
      responses:
        "201":
          description: Solicitação criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solicitacao"
        "422":
          $ref: "#/components/responses/ValidationError"
  /solicitacoes/{id}:
    get:
      summary: Obtém uma solicitação
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Solicitação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solicitacao"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Atualiza campos permitidos
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
      responses:
        "200":
          description: Solicitação atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solicitacao"
        "422":
          $ref: "#/components/responses/ValidationError"
  /solicitacoes/{id}/interacoes:
    post:
      summary: Registra uma interação
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarInteracaoRequest"
      responses:
        "201":
          description: Interação criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solicitacao"
  /solicitacoes/{id}/tarefas:
    post:
      summary: Cria uma tarefa vinculada à solicitação
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [titulo]
              properties:
                titulo: { type: string, minLength: 3, maxLength: 180 }
                descricao: { type: string }
                responsavelId: { type: string, format: uuid }
                prioridade: { type: string, enum: [BAIXA, MEDIA, ALTA, CRITICA] }
                prazo: { type: string, format: date-time }
      responses:
        "201":
          description: Tarefa criada
  /tarefas/{id}:
    patch:
      summary: Atualiza estado, prioridade ou prazo da tarefa
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Tarefa atualizada
  /solicitacoes/agrupar-duplicadas:
    post:
      summary: Agrupa solicitações duplicadas sem excluí-las
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [solicitacaoIds, motivo]
              properties:
                solicitacaoIds:
                  type: array
                  minItems: 2
                  items: { type: string, format: uuid }
                motivo: { type: string, minLength: 1, maxLength: 500 }
      responses:
        "201":
          description: Grupo de duplicidades criado ou ampliado
  /solicitacoes/{id}/anexos:
    post:
      summary: Envia e verifica um anexo da solicitação
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [arquivo]
              properties:
                arquivo: { type: string, format: binary }
      responses:
        "201":
          description: Anexo validado e armazenado; áudios iniciam transcrição e imagens/PDFs iniciam OCR assíncrono
  /transcricoes-audio/{id}/revisao:
    post:
      summary: Aceita, corrige ou rejeita uma transcrição de áudio
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [acao]
              properties:
                acao:
                  type: string
                  enum: [ACEITAR, EDITAR, REJEITAR]
                texto:
                  type: string
                  description: Obrigatório quando a ação for EDITAR
      responses:
        "200": { description: Revisão humana registrada e auditada }
        "409": { description: Transcrição pendente ou já revisada }
        "422": { description: Ação ou texto revisado inválido }
  /transcricoes-audio/{id}/reprocessar:
    post:
      summary: Reagenda uma transcrição local que terminou com falha
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "202": { description: Reprocessamento agendado no outbox }
        "409": { description: A transcrição não está com falha }
  /ocr-documentos/{id}/revisao:
    post:
      summary: Aceita, corrige ou rejeita o texto extraído por OCR
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [acao]
              properties:
                acao:
                  type: string
                  enum: [ACEITAR, EDITAR, REJEITAR]
                texto:
                  type: string
                  description: Obrigatório quando a ação for EDITAR
      responses:
        "200": { description: Revisão humana do OCR registrada e auditada }
        "409": { description: OCR pendente ou já revisado }
        "422": { description: Ação ou texto revisado inválido }
  /ocr-documentos/{id}/reprocessar:
    post:
      summary: Reagenda um OCR local que terminou com falha
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "202": { description: Reprocessamento agendado no outbox }
        "409": { description: O OCR não está com falha }
  /solicitacoes/{id}/encaminhamentos:
    post:
      summary: Encaminha uma solicitação para órgão externo
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "201": { description: Encaminhamento criado }
  /encaminhamentos/{id}:
    patch:
      summary: Registra protocolo ou resposta do órgão externo
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Encaminhamento atualizado }
  /solicitacoes/{id}/reabrir:
    post:
      summary: Reabre uma solicitação encerrada mediante motivo
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Solicitação reaberta }
  /solicitacoes/{id}/chave-publica:
    post:
      summary: Gera e rotaciona a chave de acompanhamento público
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Chave gerada }
  /publico/solicitacoes/{protocolo}:
    get:
      summary: Consulta pública mínima da solicitação
      security: []
      parameters:
        - in: path
          name: protocolo
          required: true
          schema: { type: string }
        - in: query
          name: chave
          required: true
          schema: { type: string }
      responses:
        "200": { description: Estado público da solicitação }
        "403": { description: Chave inválida }
  /painel/operacional:
    get:
      summary: Retorna indicadores e fila prioritária do tenant
      responses:
        "200": { description: Painel operacional }
  /anexos/{id}/download:
    get:
      summary: Baixa um anexo por token temporário assinado
      parameters:
        - $ref: "#/components/parameters/Id"
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Conteúdo do anexo
  /cidadaos:
    get:
      summary: Lista cidadãos do tenant
      responses:
        "200": { description: Lista de cidadãos }
    post:
      summary: Cadastra cidadão, contatos, base legal e consentimentos
      responses:
        "201": { description: Cidadão criado }
  /cidadaos/{id}:
    get:
      summary: Obtém cidadão e histórico de solicitações
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Cidadão }
    patch:
      summary: Atualiza o cadastro do cidadão
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200": { description: Cidadão atualizado }
  /organizacoes:
    get:
      summary: Lista organizações do tenant
      responses:
        "200": { description: Lista de organizações }
    post:
      summary: Cadastra uma organização
      responses:
        "201": { description: Organização criada }
  /admin/categorias:
    get:
      summary: Lista categorias e SLA
      responses:
        "200": { description: Lista de categorias }
    post:
      summary: Cria categoria e SLA
      responses:
        "201": { description: Categoria criada }
  /admin/territorios:
    get:
      summary: Lista territórios
      responses:
        "200": { description: Lista de territórios }
    post:
      summary: Cria território
      responses:
        "201": { description: Território criado }
  /admin/orgaos:
    get:
      summary: Lista órgãos externos
      responses:
        "200": { description: Lista de órgãos }
    post:
      summary: Cria órgão externo
      responses:
        "201": { description: Órgão criado }
  /notificacoes:
    get:
      summary: Lista notificações do usuário autenticado
      responses:
        "200": { description: Notificações e total não lido }
  /notificacoes/preferencias:
    get:
      summary: Lista preferências de notificação do usuário
      responses:
        "200": { description: Preferências efetivas }
    put:
      summary: Atualiza preferências de notificação do usuário
      responses:
        "200": { description: Preferências atualizadas }
  /notificacoes/marcar-todas-lidas:
    post:
      summary: Marca todas as notificações do usuário como lidas
      responses:
        "200": { description: Quantidade atualizada }
  /solicitacoes/{id}/tentativas-contato:
    post:
      summary: Registra tentativa de contato com o cidadão
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resultado]
              properties:
                canal:
                  type: string
                  enum: [WHATSAPP, TELEFONE, EMAIL, PRESENCIAL]
                destino: { type: string, maxLength: 254 }
                resultado:
                  type: string
                  enum: [REALIZADO, SEM_RESPOSTA, FALHOU, AGENDADO]
                observacoes: { type: string }
                justificativaCanal: { type: string }
                tentadaEm: { type: string, format: date-time }
                proximaTentativaEm: { type: string, format: date-time }
      responses:
        "201": { description: Tentativa registrada }
        "422": { description: Canal, destino ou resultado inválido }
  /solicitacoes/{id}/classificacao-ia:
    post:
      summary: Solicita triagem e detecção de possíveis duplicidades por IA
      description: >-
        Processa classificação, entidades, resumo e candidatos semanticamente similares
        do mesmo tenant. Candidatos a duplicidade exigem confirmação humana pelo endpoint
        de agrupamento e nenhuma solicitação é excluída.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "202":
          description: Processamento aceito
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /classificacoes-ia/{id}/revisao:
    post:
      summary: Aceita, edita ou rejeita uma classificação sugerida por IA
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [acao]
              properties:
                acao:
                  type: string
                  enum: [ACEITAR, EDITAR, REJEITAR]
                valores:
                  type: object
                  properties:
                    categoriaId: { type: string, format: uuid }
                    orgaoId: { type: string, format: uuid }
                    subcategoria: { type: string }
                    prioridadeSugerida:
                      type: string
                      enum: [BAIXA, MEDIA, ALTA, CRITICA]
                    impacto:
                      type: string
                      enum: [BAIXO, MEDIO, ALTO, CRITICO]
                    urgencia:
                      type: string
                      enum: [BAIXO, MEDIO, ALTO, CRITICO]
      responses:
        "200":
          description: Revisão humana registrada
        "409":
          description: Execução ainda pendente ou já revisada
  /solicitacoes/{id}/assistencia-ia:
    post:
      summary: Gera resumo, perguntas, documentos, próximos passos e resposta sugerida
      description: >-
        Processamento assíncrono e restrito ao tenant. A saída é somente um rascunho;
        não registra interação nem envia mensagem.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                canal:
                  type: string
                  enum: [WHATSAPP, EMAIL, TELEFONE, PRESENCIAL, INTERNO]
                tom:
                  type: string
                  enum: [ACOLHEDOR, CLARO, FORMAL, OBJETIVO]
      responses:
        "202":
          description: Assistência aceita para processamento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecucaoAssistenciaIA"
        "422": { description: Canal ou tom inválido }
  /assistencias-ia/{id}/revisao:
    post:
      summary: Aceita, edita ou rejeita o rascunho sem enviá-lo
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [acao]
              properties:
                acao:
                  type: string
                  enum: [ACEITAR, EDITAR, REJEITAR]
                valores:
                  type: object
                  properties:
                    canal:
                      type: string
                      enum: [WHATSAPP, EMAIL, TELEFONE, PRESENCIAL, INTERNO]
                    assunto: { type: [string, "null"] }
                    conteudo: { type: string }
      responses:
        "200":
          description: Revisão auditada; nenhuma mensagem foi enviada
        "409": { description: Assistência pendente ou já revisada }
  /ia/qualidade-triagem:
    get:
      summary: Consolida métricas de qualidade da triagem assistida por tenant
      parameters:
        - in: query
          name: dias
          schema:
            type: integer
            enum: [30, 90, 180, 365]
            default: 30
      responses:
        "200":
          description: Indicadores de execução, revisão humana, cobertura e modelos
        "422":
          description: Período não suportado
  /solicitacoes/{id}/gerar-minuta:
    post:
      summary: Gera rascunho legislativo
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tipo]
              properties:
                tipo:
                  type: string
                  enum: [INDICACAO, REQUERIMENTO, OFICIO, MOCAO, PEDIDO_INFORMACAO, PROJETO_LEI]
                titulo:
                  type: string
                  maxLength: 240
                templateId:
                  type: string
                  format: uuid
                solicitacoesRelacionadasIds:
                  type: array
                  maxItems: 19
                  uniqueItems: true
                  items: { type: string, format: uuid }
                fatosSelecionados:
                  type: array
                  items: { type: string }
                instrucoes:
                  type: string
                fontesNormativas:
                  type: array
                  items:
                    $ref: "#/components/schemas/FonteNormativa"
      responses:
        "202":
          description: Geração aceita
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinutaLegislativa"
        "422": { description: Tipo, fonte ou conjunto de solicitações inválido }
  /rag/documentos:
    get:
      summary: Lista documentos acessíveis da base RAG do tenant
      parameters:
        - in: query
          name: q
          schema: { type: string, maxLength: 100 }
      responses:
        "200":
          description: Documentos filtrados por tenant e nível de acesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items: { $ref: "#/components/schemas/DocumentoRag" }
    post:
      summary: Cadastra documento e enfileira sua primeira versão para ingestão
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/EntradaDocumentoRag" }
      responses:
        "202": { description: Documento aceito para processamento }
        "403": { description: Perfil sem permissão de gestão }
        "409": { description: Título já cadastrado no tenant }
        "422": { description: Metadados ou arquivo inválido }
  /rag/documentos/{id}:
    get:
      summary: Consulta documento e histórico de versões
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: Documento com versões
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentoRag" }
        "404": { description: Documento inexistente ou sem acesso }
  /rag/documentos/{id}/versoes:
    post:
      summary: Adiciona versão imutável e enfileira nova ingestão
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/EntradaVersaoRag" }
      responses:
        "202": { description: Versão aceita para processamento }
        "404": { description: Documento inexistente no tenant }
        "409": { description: Identificador de versão duplicado }
        "422": { description: Metadados ou arquivo inválido }
  /rag/documentos/{id}/versoes/{version_id}/estado:
    patch:
      summary: Publica, torna histórica ou revoga uma versão
      parameters:
        - $ref: "#/components/parameters/Id"
        - in: path
          name: version_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [estado]
              properties:
                estado: { type: string, enum: [RASCUNHO, VIGENTE, HISTORICO, REVOGADO] }
      responses:
        "200": { description: Estado alterado e auditado }
        "409": { description: Versão ainda não indexada }
        "422": { description: Estado inválido }
  /rag/documentos/{id}/versoes/{version_id}/reprocessar:
    post:
      summary: Reenfileira uma versão para extração e indexação
      parameters:
        - $ref: "#/components/parameters/Id"
        - in: path
          name: version_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "202": { description: Reprocessamento enfileirado }
        "409": { description: Versão já em processamento }
  /legislativo/minutas:
    get:
      summary: Lista minutas legislativas do tenant
      parameters:
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: tipo, schema: { type: string } }
      responses:
        "200": { description: Minutas filtradas do tenant }
  /legislativo/minutas/{id}:
    get:
      summary: Consulta conteúdo, fontes, versões e vínculos da minuta
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Minuta encontrada
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MinutaLegislativa" }
        "404": { description: Minuta inexistente no tenant }
  /legislativo/minutas/{id}/versoes:
    get:
      summary: Lista o histórico imutável de versões da minuta
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Versões em ordem decrescente
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items: { $ref: "#/components/schemas/VersaoMinutaLegislativa" }
        "404": { description: Minuta inexistente no tenant }
  /legislativo/minutas/{id}/versoes/{numero}:
    get:
      summary: Consulta o snapshot completo de uma versão
      parameters:
        - $ref: "#/components/parameters/Id"
        - in: path
          name: numero
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Snapshot imutável da versão
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersaoMinutaLegislativa" }
        "404": { description: Minuta ou versão inexistente no tenant }
  /legislativo/minutas/{id}/comparacao:
    get:
      summary: Compara dois snapshots da minuta campo a campo
      parameters:
        - $ref: "#/components/parameters/Id"
        - in: query
          name: de
          required: true
          schema: { type: integer, minimum: 1 }
        - in: query
          name: para
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Diferenças entre as versões
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComparacaoVersoesMinuta" }
        "404": { description: Minuta ou versão inexistente no tenant }
        "422": { description: Números de versão ausentes, inválidos ou iguais }
  /legislativo/minutas/{id}/versoes/{numero}/restaurar:
    post:
      summary: Restaura um snapshot como uma nova versão da minuta
      parameters:
        - $ref: "#/components/parameters/Id"
        - in: path
          name: numero
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [motivo]
              properties:
                motivo: { type: string, minLength: 1, maxLength: 500 }
      responses:
        "200":
          description: Nova versão criada a partir do snapshot selecionado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MinutaLegislativa" }
        "404": { description: Minuta ou versão inexistente no tenant }
        "409": { description: Minuta em estado final ou versão já atual }
        "422": { description: Motivo da restauração ausente }
  /legislativo/minutas/{id}/revisao:
    post:
      summary: Salva versão, submete, aprova ou rejeita uma minuta
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [acao]
              properties:
                acao:
                  type: string
                  enum: [SALVAR, SUBMETER, APROVAR, REJEITAR]
                titulo: { type: string }
                conteudo: { type: string }
                justificativa: { type: string }
                motivo: { type: string }
                confirmarFundamentacao: { type: boolean }
      responses:
        "200": { description: Decisão humana registrada e auditada }
        "409": { description: Estado incompatível ou fundamentação sem confirmação }
  /legislativo/minutas/{id}/protocolo:
    post:
      summary: Registra manualmente protocolo externo de minuta aprovada
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [protocolo]
              properties:
                protocolo: { type: string, maxLength: 100 }
      responses:
        "200": { description: Protocolo manual registrado }
        "409": { description: Minuta não aprovada ou protocolo duplicado }
  /legislativo/minutas/{id}/tramitacoes:
    get:
      summary: Lista a timeline imutável de tramitação da minuta
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Andamentos em ordem cronológica
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items: { $ref: "#/components/schemas/TramitacaoLegislativa" }
        "404": { description: Minuta inexistente no tenant }
    post:
      summary: Acrescenta um andamento à tramitação de uma minuta protocolada
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status, etapa]
              properties:
                status:
                  type: string
                  enum: [DISTRIBUIDA, EM_COMISSAO, EM_PAUTA, APROVADA, REJEITADA, SANCIONADA, VETADA, ARQUIVADA, RETIRADA]
                etapa: { type: string, maxLength: 160 }
                destino: { type: string, maxLength: 180 }
                referenciaExterna: { type: string, maxLength: 180 }
                observacoes: { type: string, maxLength: 4000 }
                ocorridaEm: { type: string, format: date-time }
      responses:
        "201":
          description: Andamento registrado e auditado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MinutaLegislativa" }
        "403": { description: Perfil sem permissão de gestão }
        "404": { description: Minuta inexistente no tenant }
        "409": { description: Minuta ainda não aprovada e protocolada }
        "422": { description: Estado, etapa ou data inválida }
  /legislativo/minutas/{id}/exportar/{formato}:
    get:
      summary: Exporta uma minuta para DOCX ou PDF
      parameters:
        - $ref: "#/components/parameters/Id"
        - in: path
          name: formato
          required: true
          schema: { type: string, enum: [docx, pdf] }
      responses:
        "200": { description: Arquivo legislativo }
  /legislativo/minutas/{id}/fundamentacao/recuperar:
    post:
      summary: Recupera fontes normativas vigentes para revisão humana
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                consulta: { type: string, minLength: 3, maxLength: 30000 }
      responses:
        "200":
          description: Fontes ranqueadas sem aplicação automática
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResultadoRecuperacaoFundamentacao" }
        "404": { description: Minuta inexistente no tenant }
        "409": { description: Geração da minuta ainda não concluída }
        "422": { description: Consulta inválida }
  /legislativo/minutas/{id}/fundamentacao/aplicar:
    post:
      summary: Confirma fontes recuperadas e cria uma nova versão da minuta
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fonteIds, motivo]
              properties:
                fonteIds:
                  type: array
                  minItems: 1
                  maxItems: 10
                  uniqueItems: true
                  items: { type: string, format: uuid }
                motivo: { type: string, minLength: 1, maxLength: 500 }
      responses:
        "200":
          description: Fundamentação confirmada, versionada e auditada
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MinutaLegislativa" }
        "404": { description: Minuta inexistente no tenant }
        "409": { description: Minuta não editável }
        "422": { description: Fonte não recuperada, inativa, expirada ou inválida }
  /legislativo/fontes-normativas:
    get:
      summary: Lista o catálogo normativo do tenant
      parameters:
        - in: query
          name: q
          schema: { type: string, maxLength: 100 }
        - in: query
          name: incluirInativas
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Fontes do tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items: { $ref: "#/components/schemas/FonteNormativaCatalogo" }
        "403": { description: Inclusão de fontes inativas exige perfil gestor }
    post:
      summary: Cadastra uma fonte normativa versionada no tenant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FonteNormativaCatalogoEntrada" }
      responses:
        "201":
          description: Fonte criada e auditada
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FonteNormativaCatalogo" }
        "403": { description: Perfil sem permissão de gestão }
        "409": { description: Mesma fonte, referência e versão já cadastradas }
        "422": { description: Fonte inválida }
  /legislativo/fontes-normativas/{id}:
    put:
      summary: Atualiza os metadados e o trecho de uma fonte normativa
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FonteNormativaCatalogoEntrada" }
      responses:
        "200":
          description: Fonte atualizada e auditada
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FonteNormativaCatalogo" }
        "403": { description: Perfil sem permissão de gestão }
        "404": { description: Fonte inexistente no tenant }
        "409": { description: Versão duplicada }
        "422": { description: Fonte inválida }
  /legislativo/fontes-normativas/{id}/status:
    patch:
      summary: Ativa ou desativa uma fonte sem apagar seu histórico
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ativo]
              properties:
                ativo: { type: boolean }
      responses:
        "200":
          description: Status alterado e auditado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FonteNormativaCatalogo" }
        "403": { description: Perfil sem permissão de gestão }
        "404": { description: Fonte inexistente no tenant }
        "422": { description: Status inválido }
  /legislativo/templates:
    get:
      summary: Lista templates legislativos do tenant
      parameters:
        - in: query
          name: incluirInativos
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Templates disponíveis conforme o perfil e filtro
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items: { $ref: "#/components/schemas/TemplateLegislativo" }
        "403": { description: Inclusão de inativos exige perfil gestor }
    post:
      summary: Cadastra template legislativo do tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tipo, nome, estrutura]
              properties:
                tipo: { type: string }
                nome: { type: string }
                estrutura: { type: string }
      responses:
        "201":
          description: Template criado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TemplateLegislativo" }
        "409": { description: Nome já utilizado no tenant }
        "422": { description: Tipo, nome ou estrutura inválida }
  /legislativo/templates/{id}:
    put:
      summary: Atualiza nome, tipo e estrutura de um template
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tipo, nome, estrutura]
              properties:
                tipo:
                  type: string
                  enum: [INDICACAO, REQUERIMENTO, OFICIO, MOCAO, PEDIDO_INFORMACAO, PROJETO_LEI]
                nome: { type: string, maxLength: 160 }
                estrutura: { type: string, maxLength: 20000 }
      responses:
        "200":
          description: Template atualizado e auditado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TemplateLegislativo" }
        "403": { description: Perfil sem permissão de gestão }
        "404": { description: Template inexistente no tenant }
        "409": { description: Nome já utilizado no tenant }
        "422": { description: Tipo, nome ou estrutura inválida }
  /legislativo/templates/{id}/status:
    patch:
      summary: Ativa ou desativa um template preservando seus vínculos históricos
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ativo]
              properties:
                ativo: { type: boolean }
      responses:
        "200":
          description: Status alterado e auditado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TemplateLegislativo" }
        "403": { description: Perfil sem permissão de gestão }
        "404": { description: Template inexistente no tenant }
        "422": { description: Status inválido }
  /legislativo/precedentes:
    get:
      summary: Pesquisa semanticamente proposições do tenant com embeddings locais
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 3 }
        - in: query
          name: tipo
          schema:
            type: string
            enum: [INDICACAO, REQUERIMENTO, OFICIO, MOCAO, PEDIDO_INFORMACAO, PROJETO_LEI]
        - in: query
          name: status
          schema:
            type: string
            enum: [RASCUNHO, EM_REVISAO, APROVADA, REJEITADA]
        - in: query
          name: excluirMinutaId
          schema: { type: string, format: uuid }
        - in: query
          name: limite
          schema: { type: integer, minimum: 1, maximum: 20, default: 10 }
      responses:
        "200":
          description: Precedentes ordenados por similaridade semântica
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResultadoBuscaPrecedentes" }
        "422": { description: Consulta curta ou filtros inválidos }
  /assistente/consultas:
    post:
      summary: Realiza consulta ao assistente RAG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RagQueryRequest"
      responses:
        "200":
          description: Resposta fundamentada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagAnswer"
  /assistente/consultas/{consultaId}/avaliacao:
    patch:
      summary: Registra avaliação ou correção humana de uma resposta RAG
      parameters:
        - in: path
          name: consultaId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RagQueryFeedbackRequest"
      responses:
        "200":
          description: Avaliação registrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagAnswer"
        "404":
          description: Consulta não encontrada
        "422":
          description: Avaliação inválida
  /insights:
    get:
      summary: Lista insights disponíveis
      parameters:
        - in: query
          name: inicio
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: fim
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: tipo
          schema:
            type: string
      responses:
        "200":
          description: Insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"
  /admin/templates-resposta:
    get:
      summary: Lista templates de resposta do tenant
      responses:
        "200":
          description: Templates disponíveis
    post:
      summary: Cadastra template por canal e categoria
      responses:
        "201":
          description: Template criado
        "422":
          description: Variável ou conteúdo inválido
  /admin/templates-resposta/{templateId}:
    patch:
      summary: Atualiza e versiona um template de resposta
      parameters:
        - in: path
          name: templateId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Template atualizado
  /solicitacoes/{solicitacaoId}/respostas/preview:
    post:
      summary: Renderiza template com variáveis seguras
      parameters:
        - in: path
          name: solicitacaoId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Prévia editável da resposta
  /solicitacoes/{solicitacaoId}/respostas:
    post:
      summary: Registra resposta e agenda envio assíncrono de e-mail quando aplicável
      parameters:
        - in: path
          name: solicitacaoId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Resposta registrada em canal sem entrega assíncrona
        "202":
          description: Resposta registrada e entrega de e-mail agendada no outbox
  /solicitacoes/{solicitacaoId}/retornos:
    post:
      summary: Agenda retorno com responsável e lembrete
      parameters:
        - in: path
          name: solicitacaoId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Retorno agendado
  /retornos/{retornoId}:
    patch:
      summary: Conclui, cancela ou reagenda um retorno
      parameters:
        - in: path
          name: retornoId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Retorno atualizado com histórico e auditoria
  /privacidade/resumo:
    get:
      summary: Resume solicitações LGPD e políticas do tenant
      responses:
        "200":
          description: Indicadores de privacidade
  /privacidade/solicitacoes:
    get:
      summary: Lista solicitações de direitos do titular
      responses:
        "200":
          description: Solicitações do tenant
    post:
      summary: Registra solicitação de acesso, correção, anonimização ou revogação
      responses:
        "201":
          description: Solicitação registrada
  /privacidade/solicitacoes/{solicitacaoId}:
    patch:
      summary: Atualiza validação, responsável, estado e resolução
      parameters:
        - in: path
          name: solicitacaoId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Solicitação atualizada e auditada
  /privacidade/solicitacoes/{solicitacaoId}/exportar:
    post:
      summary: Exporta pacote JSON após validação de identidade
      parameters:
        - in: path
          name: solicitacaoId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pacote de dados do titular
        "422":
          description: Identidade não validada ou tipo incompatível
  /cidadaos/{cidadaoId}/consentimentos:
    get:
      summary: Lista histórico imutável de consentimentos
      responses:
        "200":
          description: Histórico por finalidade
    post:
      summary: Registra concessão ou revogação de consentimento
      responses:
        "201":
          description: Consentimento registrado
  /privacidade/retencao:
    get:
      summary: Lista políticas de retenção
      responses:
        "200":
          description: Políticas do tenant
    put:
      summary: Cria ou atualiza política de retenção
      responses:
        "200":
          description: Política salva e auditada
  /auditoria:
    get:
      summary: Consulta trilha de auditoria do tenant
      responses:
        "200":
          description: Eventos paginados
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token_cookie
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  responses:
    NotFound:
      description: Recurso não encontrado
    ValidationError:
      description: Erro de validação
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    EntradaVersaoRag:
      type: object
      required: [arquivo, versao]
      properties:
        arquivo: { type: string, format: binary }
        versao: { type: string, maxLength: 80 }
        vigenteDesde: { type: string, format: date }
        vigenteAte: { type: string, format: date }
        urlFonte: { type: string, format: uri }
    EntradaDocumentoRag:
      allOf:
        - $ref: "#/components/schemas/EntradaVersaoRag"
        - type: object
          required: [titulo, tipo, nivelAcesso]
          properties:
            titulo: { type: string, maxLength: 240 }
            tipo: { type: string, enum: [LEGISLACAO, ATO, ATA, RESPOSTA_ORGAO, CONTRATO, PROCESSO, PROCEDIMENTO_INTERNO, OUTRO] }
            orgao: { type: string, maxLength: 180 }
            nivelAcesso: { type: string, enum: [INTERNO, RESTRITO] }
    VersaoDocumentoRag:
      type: object
      properties:
        id: { type: string, format: uuid }
        numero: { type: integer, minimum: 1 }
        versao: { type: string }
        estado: { type: string, enum: [RASCUNHO, VIGENTE, HISTORICO, REVOGADO] }
        statusIngestao: { type: string, enum: [PENDENTE, PROCESSANDO, INDEXADO, FALHOU] }
        checksum: { type: string }
        paginas: { type: integer }
        fragmentos: { type: integer }
        modeloEmbedding: { type: string }
        erro: { type: string, nullable: true }
    DocumentoRag:
      type: object
      properties:
        id: { type: string, format: uuid }
        titulo: { type: string }
        tipo: { type: string }
        orgao: { type: string, nullable: true }
        nivelAcesso: { type: string, enum: [INTERNO, RESTRITO] }
        ativo: { type: boolean }
        quantidadeVersoes: { type: integer }
        versoes:
          type: array
          items: { $ref: "#/components/schemas/VersaoDocumentoRag" }
    CriarSolicitacaoRequest:
      type: object
      required: [origem, descricao]
      properties:
        cidadaoId:
          type: string
          format: uuid
        origem:
          type: string
          enum: [PRESENCIAL, TELEFONE, WHATSAPP, EMAIL, FORMULARIO, REDE_SOCIAL, VISITA]
        titulo:
          type: string
          maxLength: 180
        descricao:
          type: string
          minLength: 3
        endereco:
          type: string
          maxLength: 500
        categoria:
          type: string
          maxLength: 100
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        anexos:
          type: array
          items:
            type: string
            format: uuid
    Solicitacao:
      type: object
      required: [id, protocolo, origem, descricao, status, criadaEm]
      properties:
        id:
          type: string
          format: uuid
        protocolo:
          type: string
        origem:
          type: string
        titulo:
          type: string
        descricao:
          type: string
        status:
          type: string
          enum: [NOVA, TRIAGEM, EM_ATENDIMENTO, AGUARDANDO_ORGAO, AGUARDANDO_CIDADAO, RESOLVIDA, ENCERRADA, CANCELADA]
        prioridade:
          type: string
          enum: [BAIXA, MEDIA, ALTA, CRITICA]
        categoriaId:
          type: string
          format: uuid
        categoria:
          type: string
        subcategoriaId:
          type: string
          format: uuid
        responsavelId:
          type: string
          format: uuid
        endereco:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        motivoEncerramento:
          type: string
        evidenciaEncerramento:
          type: string
        encerradaEm:
          type: string
          format: date-time
        interacoes:
          type: array
          items:
            $ref: "#/components/schemas/Interacao"
        historico:
          type: array
          items:
            $ref: "#/components/schemas/HistoricoSolicitacao"
        criadaEm:
          type: string
          format: date-time
        atualizadaEm:
          type: string
          format: date-time
    SolicitacaoPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/Solicitacao"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
    CriarInteracaoRequest:
      type: object
      required: [tipo, canal, direcao, conteudo]
      properties:
        tipo:
          type: string
        canal:
          type: string
        direcao:
          type: string
          enum: [ENTRADA, SAIDA, INTERNA]
        conteudo:
          type: string
        visibilidade:
          type: string
          enum: [INTERNA, CIDADAO]
    Interacao:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tipo:
          type: string
        canal:
          type: string
        direcao:
          type: string
          enum: [ENTRADA, SAIDA, INTERNA]
        conteudo:
          type: string
        visibilidade:
          type: string
          enum: [INTERNA, CIDADAO]
        criadaEm:
          type: string
          format: date-time
    HistoricoSolicitacao:
      type: object
      properties:
        id:
          type: string
          format: uuid
        acao:
          type: string
        alteracoes:
          type: object
          additionalProperties: true
        usuarioId:
          type: string
          format: uuid
        criadaEm:
          type: string
          format: date-time
    Job:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDENTE, PROCESSANDO, CONCLUIDO, FALHOU]
    ExecucaoAssistenciaIA:
      type: object
      properties:
        id: { type: string, format: uuid }
        status:
          type: string
          enum: [PENDENTE, PROCESSANDO, CONCLUIDA, FALHOU]
        statusRevisao:
          type: string
          enum: [PENDENTE, ACEITA, EDITADA, REJEITADA]
        modelo: { type: string }
        versaoPrompt: { type: string }
        confianca: { type: number, minimum: 0, maximum: 1 }
        resultado:
          type: object
          properties:
            resumoHistorico: { type: string }
            perguntasFaltantes:
              type: array
              items: { type: string }
            documentosNecessarios:
              type: array
              items: { type: object, additionalProperties: true }
            proximosPassos:
              type: array
              items: { type: object, additionalProperties: true }
            respostaSugerida: { type: object, additionalProperties: true }
            revisaoHumanaObrigatoria: { type: boolean, enum: [true] }
            envioAutomatico: { type: boolean, enum: [false] }
    FonteNormativa:
      type: object
      required: [titulo]
      properties:
        titulo: { type: string }
        referencia: { type: string }
        trecho: { type: string }
        validadaPeloUsuario: { type: boolean }
        sourceId: { type: string, format: uuid }
        versaoFonte: { type: string }
        checksum: { type: string }
        recuperadaVia: { type: string, enum: [RAG_NORMATIVO_V1] }
        url: { type: string, format: uri, nullable: true }
    FonteNormativaCatalogoEntrada:
      type: object
      required: [tipo, titulo, referencia, trecho]
      properties:
        tipo:
          type: string
          enum: [LEI_ORGANICA, REGIMENTO_INTERNO, LEI_MUNICIPAL, DECRETO, PLANO_DIRETOR, CODIGO_OBRAS, CODIGO_POSTURAS, OUTRO]
        titulo: { type: string, maxLength: 240 }
        referencia: { type: string, maxLength: 240 }
        trecho: { type: string, minLength: 20, maxLength: 20000 }
        jurisdicao: { type: string, maxLength: 120, nullable: true }
        url: { type: string, format: uri, nullable: true }
        versao: { type: string, maxLength: 80, default: "1" }
        vigenteDesde: { type: string, format: date, nullable: true }
        vigenteAte: { type: string, format: date, nullable: true }
    FonteNormativaCatalogo:
      allOf:
        - $ref: "#/components/schemas/FonteNormativaCatalogoEntrada"
        - type: object
          required: [id, checksum, colecaoRag, ativo, criadaEm, atualizadaEm]
          properties:
            id: { type: string, format: uuid }
            checksum: { type: string }
            colecaoRag: { type: string, enum: [legislacao] }
            ativo: { type: boolean }
            criadaEm: { type: string, format: date-time }
            atualizadaEm: { type: string, format: date-time }
            pontuacao: { type: number, minimum: 0, maximum: 1 }
            similaridadeSemantica: { type: number, minimum: 0, maximum: 1 }
            similaridadeLexical: { type: number, minimum: 0, maximum: 1 }
            justificativas:
              type: array
              items: { type: string }
    ResultadoRecuperacaoFundamentacao:
      type: object
      required: [consulta, colecao, modelo, fallbackUtilizado, limiar, totalCandidatos, fontes, grounded, revisaoHumanaObrigatoria, aplicacaoAutomatica, conteudoTratadoComoDado]
      properties:
        consulta: { type: string }
        colecao: { type: string, enum: [legislacao] }
        modelo: { type: string }
        fallbackUtilizado: { type: boolean }
        erroFallback: { type: string, nullable: true }
        limiar: { type: number, minimum: 0, maximum: 1 }
        totalCandidatos: { type: integer, minimum: 0 }
        fontes:
          type: array
          items: { $ref: "#/components/schemas/FonteNormativaCatalogo" }
        grounded: { type: boolean }
        revisaoHumanaObrigatoria: { type: boolean, enum: [true] }
        aplicacaoAutomatica: { type: boolean, enum: [false] }
        conteudoTratadoComoDado: { type: boolean, enum: [true] }
    TemplateLegislativo:
      type: object
      required: [id, tipo, nome, estrutura, ativo, criadoEm, atualizadoEm]
      properties:
        id: { type: string, format: uuid }
        tipo:
          type: string
          enum: [INDICACAO, REQUERIMENTO, OFICIO, MOCAO, PEDIDO_INFORMACAO, PROJETO_LEI]
        nome: { type: string, maxLength: 160 }
        estrutura: { type: string, maxLength: 20000 }
        ativo: { type: boolean }
        criadoEm: { type: string, format: date-time }
        atualizadoEm: { type: string, format: date-time }
    SolicitacaoVinculada:
      type: object
      required: [id, protocolo, principal]
      properties:
        id: { type: string, format: uuid }
        protocolo: { type: string }
        titulo: { type: string }
        principal: { type: boolean }
    VersaoMinutaLegislativa:
      type: object
      required: [id, numero, motivo, autor, criadaEm]
      properties:
        id: { type: string, format: uuid }
        numero: { type: integer, minimum: 1 }
        motivo: { type: string }
        autor: { type: string }
        criadaEm: { type: string, format: date-time }
        titulo: { type: string }
        conteudo: { type: string }
        justificativa: { type: string, nullable: true }
        fundamentacaoNormativa:
          type: array
          items: { $ref: "#/components/schemas/FonteNormativa" }
        fundamentacaoSugerida:
          allOf:
            - $ref: "#/components/schemas/ResultadoRecuperacaoFundamentacao"
          nullable: true
        trechosSemFundamentacao:
          type: array
          items: { type: object, additionalProperties: true }
    DiferencaCampoVersao:
      type: object
      required: [alterado, anterior, posterior, linhasAdicionadas, linhasRemovidas, diferencas]
      properties:
        alterado: { type: boolean }
        anterior: { type: string }
        posterior: { type: string }
        linhasAdicionadas: { type: integer, minimum: 0 }
        linhasRemovidas: { type: integer, minimum: 0 }
        diferencas:
          type: array
          items:
            type: object
            required: [tipo, texto]
            properties:
              tipo: { type: string, enum: [IGUAL, ADICIONADA, REMOVIDA] }
              texto: { type: string }
    ComparacaoVersoesMinuta:
      type: object
      required: [de, para, camposAlterados, linhasAdicionadas, linhasRemovidas, campos]
      properties:
        de: { type: integer, minimum: 1 }
        para: { type: integer, minimum: 1 }
        camposAlterados:
          type: array
          items: { type: string }
        linhasAdicionadas: { type: integer, minimum: 0 }
        linhasRemovidas: { type: integer, minimum: 0 }
        campos:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DiferencaCampoVersao"
    PrecedenteLegislativo:
      type: object
      required: [id, titulo, tipo, status, resumo, similaridade, similaridadeSemantica, similaridadeLexical, justificativas]
      properties:
        id: { type: string, format: uuid }
        titulo: { type: string }
        tipo:
          type: string
          enum: [INDICACAO, REQUERIMENTO, OFICIO, MOCAO, PEDIDO_INFORMACAO, PROJETO_LEI]
        status:
          type: string
          enum: [RASCUNHO, EM_REVISAO, APROVADA, REJEITADA]
        protocolo: { type: string, nullable: true }
        resumo: { type: string }
        similaridade: { type: number, minimum: 0, maximum: 1 }
        similaridadeSemantica: { type: number, minimum: 0, maximum: 1 }
        similaridadeLexical: { type: number, minimum: 0, maximum: 1 }
        criadaEm: { type: string, format: date-time }
        atualizadaEm: { type: string, format: date-time }
        aprovadaEm: { type: string, format: date-time, nullable: true }
        justificativas:
          type: array
          items: { type: string }
    ResultadoBuscaPrecedentes:
      type: object
      required: [consulta, modelo, fallbackUtilizado, limiar, totalCandidatos, content]
      properties:
        consulta: { type: string }
        modelo: { type: string }
        fallbackUtilizado: { type: boolean }
        erroFallback: { type: string, nullable: true }
        limiar: { type: number, minimum: 0, maximum: 1 }
        totalCandidatos: { type: integer, minimum: 0 }
        content:
          type: array
          items: { $ref: "#/components/schemas/PrecedenteLegislativo" }
    MinutaLegislativa:
      type: object
      required: [id, tipo, status, statusGeracao, titulo, protocoloAutomatico]
      properties:
        id: { type: string, format: uuid }
        tipo:
          type: string
          enum: [INDICACAO, REQUERIMENTO, OFICIO, MOCAO, PEDIDO_INFORMACAO, PROJETO_LEI]
        status:
          type: string
          enum: [RASCUNHO, EM_REVISAO, APROVADA, REJEITADA]
        statusGeracao:
          type: string
          enum: [PENDENTE, PROCESSANDO, CONCLUIDA, FALHOU]
        titulo: { type: string }
        conteudo: { type: string }
        justificativa: { type: string }
        versaoAtual: { type: integer, minimum: 0 }
        versoes:
          type: array
          items: { $ref: "#/components/schemas/VersaoMinutaLegislativa" }
        fundamentacaoNormativa:
          type: array
          items: { $ref: "#/components/schemas/FonteNormativa" }
        fontes:
          type: array
          items: { $ref: "#/components/schemas/FonteNormativa" }
        trechosSemFundamentacao:
          type: array
          items:
            type: object
            properties:
              trecho: { type: string }
              motivo: { type: string }
              severidade: { type: string }
        proposicoesSemelhantes:
          type: array
          items: { $ref: "#/components/schemas/PrecedenteLegislativo" }
        solicitacoes:
          type: array
          minItems: 1
          maxItems: 20
          items: { $ref: "#/components/schemas/SolicitacaoVinculada" }
        protocolo: { type: string }
        protocoladaEm: { type: string, format: date-time }
        statusTramitacao:
          type: string
          enum: [PROTOCOLADA, DISTRIBUIDA, EM_COMISSAO, EM_PAUTA, APROVADA, REJEITADA, SANCIONADA, VETADA, ARQUIVADA, RETIRADA]
        tramitacoes:
          type: array
          items: { $ref: "#/components/schemas/TramitacaoLegislativa" }
        protocoloAutomatico: { type: boolean, enum: [false] }
    TramitacaoLegislativa:
      type: object
      required: [id, status, etapa, ocorridaEm, registradaEm]
      properties:
        id: { type: string, format: uuid }
        status:
          type: string
          enum: [PROTOCOLADA, DISTRIBUIDA, EM_COMISSAO, EM_PAUTA, APROVADA, REJEITADA, SANCIONADA, VETADA, ARQUIVADA, RETIRADA]
        etapa: { type: string }
        destino: { type: string }
        referenciaExterna: { type: string }
        observacoes: { type: string }
        ocorridaEm: { type: string, format: date-time }
        registradaEm: { type: string, format: date-time }
    RagQueryRequest:
      type: object
      required: [consulta]
      properties:
        consulta:
          type: string
          minLength: 3
          maxLength: 2000
        limite:
          type: integer
          minimum: 1
          maximum: 10
    RagQueryFeedbackRequest:
      type: object
      required: [avaliacao]
      properties:
        avaliacao:
          type: string
          enum: [POSITIVA, NEGATIVA, CORRIGIDA]
        comentario:
          type: string
          maxLength: 2000
        respostaCorrigida:
          type: string
          maxLength: 10000
    RagAnswer:
      type: object
      required: [id, consulta, resposta, fontes, fundamentada, recusaConclusiva]
      properties:
        id:
          type: string
          format: uuid
        consulta:
          type: string
        resposta:
          type: string
        fundamentada:
          type: boolean
        recusaConclusiva:
          type: boolean
        conteudoTratadoComoDado:
          type: boolean
        limiarEvidencia:
          type: number
        modeloEmbedding:
          type: string
        fallbackUtilizado:
          type: boolean
        erroFallback:
          type: string
          nullable: true
        avaliacao:
          type: string
          nullable: true
          enum: [POSITIVA, NEGATIVA, CORRIGIDA]
        comentario:
          type: string
          nullable: true
        respostaCorrigida:
          type: string
          nullable: true
        seguranca:
          type: object
          required: [promptInjectionDetectado, fontesComRisco, politica]
          properties:
            promptInjectionDetectado:
              type: boolean
            fontesComRisco:
              type: array
              items:
                type: object
                properties:
                  documentoId: { type: string, format: uuid }
                  versaoId: { type: string, format: uuid }
            politica:
              type: string
        fontes:
          type: array
          items:
            type: object
            required: [documentoId, versaoId, titulo, trecho, pontuacao]
            properties:
              documentoId:
                type: string
                format: uuid
              versaoId:
                type: string
                format: uuid
              titulo:
                type: string
              tipo:
                type: string
              orgao:
                type: string
                nullable: true
              nivelAcesso:
                type: string
                enum: [INTERNO, RESTRITO]
              trecho:
                type: string
              paginaInicio:
                type: integer
                nullable: true
              paginaFim:
                type: integer
                nullable: true
              secao:
                type: string
                nullable: true
              versao:
                type: string
              estado:
                type: string
              vigenteDesde:
                type: string
                format: date
                nullable: true
              vigenteAte:
                type: string
                format: date
                nullable: true
              urlFonte:
                type: string
                nullable: true
              pontuacao:
                type: number
              similaridadeSemantica:
                type: number
              similaridadeLexical:
                type: number
              justificativas:
                type: array
                items:
                  type: string
              checksum:
                type: string
              checksumDocumento:
                type: string
              modeloEmbedding:
                type: string
              riscoPromptInjection:
                type: boolean
              conteudoSanitizado:
                type: boolean
              instrucoesIgnoradas:
                type: array
                items:
                  type: string
    Insight:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tipo:
          type: string
        titulo:
          type: string
        descricao:
          type: string
        periodoInicio:
          type: string
          format: date
        periodoFim:
          type: string
          format: date
        confianca:
          type: number
        evidencias:
          type: array
          items:
            type: string
    Problem:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
