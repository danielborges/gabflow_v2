services:
  ollama:
    image: ollama/ollama:0.12.3
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:0.12.3
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama pull ${AI_TRIAGE_MODEL:-qwen2.5:3b} && ollama pull ${AI_EMBEDDING_MODEL:-nomic-embed-text}"
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  whisper-init:
    build:
      context: ./backend
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        python -c "import os; from faster_whisper import WhisperModel;
        WhisperModel(os.environ['AUDIO_TRANSCRIPTION_MODEL'],
        device=os.environ['AUDIO_TRANSCRIPTION_DEVICE'],
        compute_type=os.environ['AUDIO_TRANSCRIPTION_COMPUTE_TYPE'],
        download_root=os.environ['AUDIO_TRANSCRIPTION_CACHE_DIR'])" &&
        chown -R gabflow:gabflow /models/whisper
    environment:
      AUDIO_TRANSCRIPTION_MODEL: ${AUDIO_TRANSCRIPTION_MODEL:-base}
      AUDIO_TRANSCRIPTION_DEVICE: ${AUDIO_TRANSCRIPTION_DEVICE:-cpu}
      AUDIO_TRANSCRIPTION_COMPUTE_TYPE: ${AUDIO_TRANSCRIPTION_COMPUTE_TYPE:-int8}
      AUDIO_TRANSCRIPTION_CACHE_DIR: ${AUDIO_TRANSCRIPTION_CACHE_DIR:-/models/whisper}
    volumes:
      - whisper_models:/models/whisper
    restart: "no"

  db:
    image: postgis/postgis:17-3.5-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gabflow}
      POSTGRES_USER: ${POSTGRES_USER:-gabflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gabflow} -d ${POSTGRES_DB:-gabflow}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_RELEASE: ${APP_RELEASE:-local}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-gabflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gabflow}
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no arquivo .env}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Defina JWT_SECRET_KEY no arquivo .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      RESEND_TIMEOUT_SECONDS: ${RESEND_TIMEOUT_SECONDS:-10}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
      RESEND_WEBHOOK_TOLERANCE_SECONDS: ${RESEND_WEBHOOK_TOLERANCE_SECONDS:-300}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      AI_TRIAGE_PROVIDER: ${AI_TRIAGE_PROVIDER:-ollama}
      AI_TRIAGE_MODEL: ${AI_TRIAGE_MODEL:-qwen2.5:3b}
      AI_TRIAGE_FALLBACK_MODEL: ${AI_TRIAGE_FALLBACK_MODEL:-gabflow-triage-rules-v1}
      AI_TRIAGE_PROMPT_VERSION: ${AI_TRIAGE_PROMPT_VERSION:-triage-v3}
      AI_TRIAGE_TIMEOUT_SECONDS: ${AI_TRIAGE_TIMEOUT_SECONDS:-120}
      AI_TRIAGE_FALLBACK_ENABLED: ${AI_TRIAGE_FALLBACK_ENABLED:-true}
      AI_ASSISTANCE_PROVIDER: ${AI_ASSISTANCE_PROVIDER:-ollama}
      AI_ASSISTANCE_MODEL: ${AI_ASSISTANCE_MODEL:-qwen2.5:3b}
      AI_ASSISTANCE_FALLBACK_MODEL: ${AI_ASSISTANCE_FALLBACK_MODEL:-gabflow-assistance-rules-v1}
      AI_ASSISTANCE_PROMPT_VERSION: ${AI_ASSISTANCE_PROMPT_VERSION:-assistance-v1}
      AI_ASSISTANCE_TIMEOUT_SECONDS: ${AI_ASSISTANCE_TIMEOUT_SECONDS:-120}
      AI_ASSISTANCE_FALLBACK_ENABLED: ${AI_ASSISTANCE_FALLBACK_ENABLED:-true}
      AI_LEGISLATIVE_PROVIDER: ${AI_LEGISLATIVE_PROVIDER:-ollama}
      AI_LEGISLATIVE_MODEL: ${AI_LEGISLATIVE_MODEL:-qwen2.5:3b}
      AI_LEGISLATIVE_FALLBACK_MODEL: ${AI_LEGISLATIVE_FALLBACK_MODEL:-gabflow-legislative-rules-v1}
      AI_LEGISLATIVE_PROMPT_VERSION: ${AI_LEGISLATIVE_PROMPT_VERSION:-legislative-v1}
      AI_LEGISLATIVE_TIMEOUT_SECONDS: ${AI_LEGISLATIVE_TIMEOUT_SECONDS:-120}
      AI_LEGISLATIVE_FALLBACK_ENABLED: ${AI_LEGISLATIVE_FALLBACK_ENABLED:-true}
      AI_DUPLICATE_PROVIDER: ${AI_DUPLICATE_PROVIDER:-ollama}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-nomic-embed-text}
      AI_DUPLICATE_WINDOW_DAYS: ${AI_DUPLICATE_WINDOW_DAYS:-180}
      AI_DUPLICATE_SCORE_THRESHOLD: ${AI_DUPLICATE_SCORE_THRESHOLD:-0.72}
      AI_DUPLICATE_MAX_SUGGESTIONS: ${AI_DUPLICATE_MAX_SUGGESTIONS:-5}
      AI_DUPLICATE_CANDIDATE_LIMIT: ${AI_DUPLICATE_CANDIDATE_LIMIT:-100}
      AI_PRECEDENT_PROVIDER: ${AI_PRECEDENT_PROVIDER:-ollama}
      AI_PRECEDENT_SCORE_THRESHOLD: ${AI_PRECEDENT_SCORE_THRESHOLD:-0.60}
      AI_PRECEDENT_MAX_RESULTS: ${AI_PRECEDENT_MAX_RESULTS:-10}
      AI_PRECEDENT_CANDIDATE_LIMIT: ${AI_PRECEDENT_CANDIDATE_LIMIT:-200}
      AI_FOUNDATION_PROVIDER: ${AI_FOUNDATION_PROVIDER:-ollama}
      AI_FOUNDATION_SCORE_THRESHOLD: ${AI_FOUNDATION_SCORE_THRESHOLD:-0.55}
      AI_FOUNDATION_MAX_RESULTS: ${AI_FOUNDATION_MAX_RESULTS:-5}
      AI_FOUNDATION_CANDIDATE_LIMIT: ${AI_FOUNDATION_CANDIDATE_LIMIT:-200}
      AUDIO_TRANSCRIPTION_PROVIDER: ${AUDIO_TRANSCRIPTION_PROVIDER:-faster-whisper}
      AUDIO_TRANSCRIPTION_MODEL: ${AUDIO_TRANSCRIPTION_MODEL:-base}
      AUDIO_TRANSCRIPTION_DEVICE: ${AUDIO_TRANSCRIPTION_DEVICE:-cpu}
      AUDIO_TRANSCRIPTION_COMPUTE_TYPE: ${AUDIO_TRANSCRIPTION_COMPUTE_TYPE:-int8}
      AUDIO_TRANSCRIPTION_LANGUAGE: ${AUDIO_TRANSCRIPTION_LANGUAGE:-pt}
      AUDIO_TRANSCRIPTION_CACHE_DIR: ${AUDIO_TRANSCRIPTION_CACHE_DIR:-/models/whisper}
      AUDIO_TRANSCRIPTION_MAX_DURATION_SECONDS: ${AUDIO_TRANSCRIPTION_MAX_DURATION_SECONDS:-900}
      DOCUMENT_OCR_PROVIDER: ${DOCUMENT_OCR_PROVIDER:-tesseract}
      DOCUMENT_OCR_MODEL: ${DOCUMENT_OCR_MODEL:-tesseract-5}
      DOCUMENT_OCR_LANGUAGE: ${DOCUMENT_OCR_LANGUAGE:-por}
      DOCUMENT_OCR_MAX_PAGES: ${DOCUMENT_OCR_MAX_PAGES:-25}
      DOCUMENT_OCR_MAX_PIXELS: ${DOCUMENT_OCR_MAX_PIXELS:-25000000}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      ATTACHMENT_STORAGE_PATH: /app/data/attachments
      MAX_ATTACHMENT_BYTES: ${MAX_ATTACHMENT_BYTES:-15728640}
      ATTACHMENT_TOKEN_MAX_AGE: ${ATTACHMENT_TOKEN_MAX_AGE:-300}
      RAG_STORAGE_PATH: /app/data/rag
      RAG_MAX_DOCUMENT_BYTES: ${RAG_MAX_DOCUMENT_BYTES:-26214400}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-ollama}
      RAG_INGESTION_TIMEOUT_SECONDS: ${RAG_INGESTION_TIMEOUT_SECONDS:-120}
      RAG_CHUNK_SIZE_CHARS: ${RAG_CHUNK_SIZE_CHARS:-1200}
      RAG_CHUNK_OVERLAP_CHARS: ${RAG_CHUNK_OVERLAP_CHARS:-150}
      RAG_MIN_TEXT_CHARS: ${RAG_MIN_TEXT_CHARS:-20}
      SEED_ADMIN_ON_START: ${SEED_ADMIN_ON_START:-true}
      SEED_TENANT: ${SEED_TENANT:-gabinete-demo}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@gabflow.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?Defina SEED_ADMIN_PASSWORD no arquivo .env}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - attachment_data:/app/data/attachments
      - rag_data:/app/data/rag
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health')"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    entrypoint: ["/app/worker-entrypoint.sh"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_RELEASE: ${APP_RELEASE:-local}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-gabflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gabflow}
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no arquivo .env}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Defina JWT_SECRET_KEY no arquivo .env}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      RESEND_TIMEOUT_SECONDS: ${RESEND_TIMEOUT_SECONDS:-10}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-2}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-20}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-5}
      WORKER_RETRY_BASE_SECONDS: ${WORKER_RETRY_BASE_SECONDS:-30}
      WORKER_RETRY_MAX_SECONDS: ${WORKER_RETRY_MAX_SECONDS:-3600}
      WORKER_LOCK_TIMEOUT_SECONDS: ${WORKER_LOCK_TIMEOUT_SECONDS:-300}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-30}
      AI_TRIAGE_PROVIDER: ${AI_TRIAGE_PROVIDER:-ollama}
      AI_TRIAGE_MODEL: ${AI_TRIAGE_MODEL:-qwen2.5:3b}
      AI_TRIAGE_FALLBACK_MODEL: ${AI_TRIAGE_FALLBACK_MODEL:-gabflow-triage-rules-v1}
      AI_TRIAGE_PROMPT_VERSION: ${AI_TRIAGE_PROMPT_VERSION:-triage-v3}
      AI_TRIAGE_TIMEOUT_SECONDS: ${AI_TRIAGE_TIMEOUT_SECONDS:-120}
      AI_TRIAGE_FALLBACK_ENABLED: ${AI_TRIAGE_FALLBACK_ENABLED:-true}
      AI_ASSISTANCE_PROVIDER: ${AI_ASSISTANCE_PROVIDER:-ollama}
      AI_ASSISTANCE_MODEL: ${AI_ASSISTANCE_MODEL:-qwen2.5:3b}
      AI_ASSISTANCE_FALLBACK_MODEL: ${AI_ASSISTANCE_FALLBACK_MODEL:-gabflow-assistance-rules-v1}
      AI_ASSISTANCE_PROMPT_VERSION: ${AI_ASSISTANCE_PROMPT_VERSION:-assistance-v1}
      AI_ASSISTANCE_TIMEOUT_SECONDS: ${AI_ASSISTANCE_TIMEOUT_SECONDS:-120}
      AI_ASSISTANCE_FALLBACK_ENABLED: ${AI_ASSISTANCE_FALLBACK_ENABLED:-true}
      AI_LEGISLATIVE_PROVIDER: ${AI_LEGISLATIVE_PROVIDER:-ollama}
      AI_LEGISLATIVE_MODEL: ${AI_LEGISLATIVE_MODEL:-qwen2.5:3b}
      AI_LEGISLATIVE_FALLBACK_MODEL: ${AI_LEGISLATIVE_FALLBACK_MODEL:-gabflow-legislative-rules-v1}
      AI_LEGISLATIVE_PROMPT_VERSION: ${AI_LEGISLATIVE_PROMPT_VERSION:-legislative-v1}
      AI_LEGISLATIVE_TIMEOUT_SECONDS: ${AI_LEGISLATIVE_TIMEOUT_SECONDS:-120}
      AI_LEGISLATIVE_FALLBACK_ENABLED: ${AI_LEGISLATIVE_FALLBACK_ENABLED:-true}
      AI_DUPLICATE_PROVIDER: ${AI_DUPLICATE_PROVIDER:-ollama}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-nomic-embed-text}
      AI_DUPLICATE_WINDOW_DAYS: ${AI_DUPLICATE_WINDOW_DAYS:-180}
      AI_DUPLICATE_SCORE_THRESHOLD: ${AI_DUPLICATE_SCORE_THRESHOLD:-0.72}
      AI_DUPLICATE_MAX_SUGGESTIONS: ${AI_DUPLICATE_MAX_SUGGESTIONS:-5}
      AI_DUPLICATE_CANDIDATE_LIMIT: ${AI_DUPLICATE_CANDIDATE_LIMIT:-100}
      AI_PRECEDENT_PROVIDER: ${AI_PRECEDENT_PROVIDER:-ollama}
      AI_PRECEDENT_SCORE_THRESHOLD: ${AI_PRECEDENT_SCORE_THRESHOLD:-0.60}
      AI_PRECEDENT_MAX_RESULTS: ${AI_PRECEDENT_MAX_RESULTS:-10}
      AI_PRECEDENT_CANDIDATE_LIMIT: ${AI_PRECEDENT_CANDIDATE_LIMIT:-200}
      AI_FOUNDATION_PROVIDER: ${AI_FOUNDATION_PROVIDER:-ollama}
      AI_FOUNDATION_SCORE_THRESHOLD: ${AI_FOUNDATION_SCORE_THRESHOLD:-0.55}
      AI_FOUNDATION_MAX_RESULTS: ${AI_FOUNDATION_MAX_RESULTS:-5}
      AI_FOUNDATION_CANDIDATE_LIMIT: ${AI_FOUNDATION_CANDIDATE_LIMIT:-200}
      AUDIO_TRANSCRIPTION_PROVIDER: ${AUDIO_TRANSCRIPTION_PROVIDER:-faster-whisper}
      AUDIO_TRANSCRIPTION_MODEL: ${AUDIO_TRANSCRIPTION_MODEL:-base}
      AUDIO_TRANSCRIPTION_DEVICE: ${AUDIO_TRANSCRIPTION_DEVICE:-cpu}
      AUDIO_TRANSCRIPTION_COMPUTE_TYPE: ${AUDIO_TRANSCRIPTION_COMPUTE_TYPE:-int8}
      AUDIO_TRANSCRIPTION_LANGUAGE: ${AUDIO_TRANSCRIPTION_LANGUAGE:-pt}
      AUDIO_TRANSCRIPTION_CACHE_DIR: ${AUDIO_TRANSCRIPTION_CACHE_DIR:-/models/whisper}
      AUDIO_TRANSCRIPTION_MAX_DURATION_SECONDS: ${AUDIO_TRANSCRIPTION_MAX_DURATION_SECONDS:-900}
      DOCUMENT_OCR_PROVIDER: ${DOCUMENT_OCR_PROVIDER:-tesseract}
      DOCUMENT_OCR_MODEL: ${DOCUMENT_OCR_MODEL:-tesseract-5}
      DOCUMENT_OCR_LANGUAGE: ${DOCUMENT_OCR_LANGUAGE:-por}
      DOCUMENT_OCR_MAX_PAGES: ${DOCUMENT_OCR_MAX_PAGES:-25}
      DOCUMENT_OCR_MAX_PIXELS: ${DOCUMENT_OCR_MAX_PIXELS:-25000000}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      ATTACHMENT_STORAGE_PATH: /app/data/attachments
      RAG_STORAGE_PATH: /app/data/rag
      RAG_MAX_DOCUMENT_BYTES: ${RAG_MAX_DOCUMENT_BYTES:-26214400}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-ollama}
      RAG_INGESTION_TIMEOUT_SECONDS: ${RAG_INGESTION_TIMEOUT_SECONDS:-120}
      RAG_CHUNK_SIZE_CHARS: ${RAG_CHUNK_SIZE_CHARS:-1200}
      RAG_CHUNK_OVERLAP_CHARS: ${RAG_CHUNK_OVERLAP_CHARS:-150}
      RAG_MIN_TEXT_CHARS: ${RAG_MIN_TEXT_CHARS:-20}
    volumes:
      - attachment_data:/app/data/attachments
      - rag_data:/app/data/rag
      - whisper_models:/models/whisper
    depends_on:
      api:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      whisper-init:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
        VITE_APP_RELEASE: ${APP_RELEASE:-local}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  attachment_data:
  rag_data:
  ollama_data:
  whisper_models:
